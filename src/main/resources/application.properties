# Server
server.port=8080
server.address=0.0.0.0
    
# Datasource (configure via env vars)
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/interview_scheduling_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:@@@@@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
#spring.jpa.hibernate.ddl-auto= update
spring.jpa.hibernate.ddl-auto= none
#spring.jpa.show-sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# SQL initialization for non-embedded DB (base DDL, then additive migrations, then seed data)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql,classpath:schema-migration.sql
spring.sql.init.data-locations=classpath:data.sql
# Don't fail startup if data.sql has errors (e.g. table schema mismatch)
spring.sql.init.continue-on-error=true

# Upload folder for user documents (local storage). Folder is created on startup if missing;
# subfolders (profile/<userId>, documents/<userId>, etc.) are created on each upload.
app.upload-dir=${UPLOAD_DIR:uploads}

# Multipart uploads (profile, education docs, certificates, etc.)
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

# Mail (configure with your SMTP provider via env vars)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:internviewpro@gmail.com}
spring.mail.password=${MAIL_PASSWORD:@@@@@}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App properties
app.base-url=http://localhost:${server.port}

# WebRTC: STUN (comma-separated). Add TURN for corporate / symmetric NAT (coturn, Twilio, etc.)
app.meeting.ice.stun-urls=stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302
# Example TURN (uncomment and set your relay):
# app.meeting.turn.urls=turn:your-turn.example.com:3478?transport=udp
# app.meeting.turn.username=turnuser
# app.meeting.turn.password=turnpass
# Topology hint for clients (mesh = current implementation; SFU would be a future mode)
app.meeting.topology=mesh

# Optional external judge (leave blank to use built-in fallback evaluator)
app.coding.judge0.url=${JUDGE0_URL:}
app.coding.judge0.api-key=${JUDGE0_API_KEY:}
