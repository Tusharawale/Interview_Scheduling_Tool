<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>
    <style>
        body { font-family: sans-serif; max-width: 420px; margin: 40px auto; }
        form { display: grid; gap: 12px; }
        input, button { padding: 10px; font-size: 16px; }
        .msg { margin-top: 12px; }
        a { font-size: 14px; }
    </style>
    <script>
        async function loginAdmin(event) {
            event.preventDefault();
            const payload = {
                adminId: document.getElementById('adminId').value,
                password: document.getElementById('password').value
            };
            const res = await fetch('/api/admin/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const msg = document.getElementById('msg');
            if (res.ok) {
                const data = await res.json().catch(() => ({}));
                localStorage.setItem('admin', 'true');
                if (data.meetingAdminToken) {
                    localStorage.setItem('adminMeetingToken', data.meetingAdminToken);
                }
                window.location.href = '/admin/admin.html';
            } else {
                msg.textContent = 'Invalid admin credentials';
                msg.style.color = 'red';
            }
        }
    </script>
    </head>
<body>
    <h2>Admin Login</h2>
    <form onsubmit="loginAdmin(event)">
        <input id="adminId" placeholder="Admin ID" value="admin" required>
        <input id="password" type="password" placeholder="Password" value="admin" required>
        <button type="submit">Login</button>
    </form>
    <div id="msg" class="msg"></div>
    <p><a href="/login.html">User login</a></p>
</body>
</html>
