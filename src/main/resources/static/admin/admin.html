<!doctype html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="css/admin-dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <style>

        body{
            font-family:'Inter',sans-serif;
            margin:0;
            background:#f5f6fa;
        }

        .container{
            display:flex;
            min-height:100vh;
        }

        /* Sidebar */

        .sidebar{
            width:220px;
            background:#1e1e2f;
            color:white;
            padding:20px;
        }

        .logo{
            display:flex;
            align-items:center;
            gap:10px;
            margin-bottom:30px;
            font-weight:600;
        }

        .sidebar nav{
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        .sidebar button{
            background:none;
            border:none;
            color:white;
            text-align:left;
            padding:10px;
            cursor:pointer;
            border-radius:5px;
        }

        .sidebar button:hover{
            background:#33334d;
        }

        .sidebar .active{
            background:#6c5ce7;
        }

        .logout{
            color:#ff7675;
        }

        /* Main */

        .main{
            flex:1;
            padding:30px;
        }

        h2{
            margin-bottom:20px;
        }

        /* Toolbar */

        .toolbar{
            display:flex;
            gap:10px;
            margin-bottom:15px;
            flex-wrap:wrap;
        }

        .toolbar input,
        .toolbar select{
            padding:8px;
            border:1px solid #ccc;
            border-radius:4px;
        }

        /* Tables */

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            margin-top:10px;
        }

        th,td{
            padding:10px;
            border:1px solid #ddd;
            text-align:left;
        }

        th{
            background:#f1f2f6;
        }

        /* Sections */

        .section{
            margin-top:40px;
        }

        /* Buttons */

        .activate{
            background:#2ecc71;
            color:white;
            border:none;
            padding:6px 10px;
            cursor:pointer;
            border-radius:4px;
        }

        .deactivate{
            background:#f39c12;
            color:white;
            border:none;
            padding:6px 10px;
            cursor:pointer;
            border-radius:4px;
        }

        .delete{
            background:#e74c3c;
            color:white;
            border:none;
            padding:6px 10px;
            cursor:pointer;
            border-radius:4px;
        }

        .view-user{
            background:#3498db;
            color:white;
            border:none;
            padding:6px 10px;
            cursor:pointer;
            border-radius:4px;
        }

        .create-btn{
            background:#6c5ce7;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:4px;
            cursor:pointer;
        }

        .admin-user-modal{
            background:white;
            padding:24px;
            border-radius:12px;
            max-width:980px;
            width:94vw;
            max-height:88vh;
            overflow-y:auto;
            box-shadow:0 4px 20px rgba(0,0,0,0.3);
        }
        .admin-user-hero{
            display:flex;
            gap:16px;
            align-items:center;
            margin-bottom:14px;
        }
        .admin-user-avatar{
            width:124px;
            height:124px;
            border-radius:50%;
            border:3px solid #ddd;
            object-fit:cover;
            background:#f1f2f6;
            box-shadow:0 8px 20px rgba(0,0,0,0.12);
        }
        .admin-user-card-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:12px;
            margin-top:8px;
        }
        .admin-user-card{
            background:#fff;
            border:1px solid #ececec;
            border-radius:10px;
            padding:12px;
        }
        .admin-user-title{
            margin:16px 0 8px;
            font-size:16px;
            color:#2d3436;
        }
        .admin-user-chip{
            display:inline-block;
            padding:4px 10px;
            border-radius:999px;
            font-size:12px;
            background:#eef2ff;
            color:#4a4a8a;
            margin-right:6px;
            margin-bottom:6px;
        }

    </style>

    <script>

        /* ---- YOUR JAVASCRIPT (UNCHANGED) ---- */

        async function loadDashboard(){

            if(!localStorage.getItem('admin')){
                window.location.href='/admin/admin-login.html'
                return
            }

            document.getElementById('startMeetingBtn').addEventListener('click', startMeetingClick)

            await loadUsers()
            await loadInterviewAdminData()

        }

        async function startMeetingClick(){
            try{
                const token=localStorage.getItem('adminMeetingToken')
                if(!token){
                    alert('Please log out and log in again to obtain meeting permissions.')
                    return
                }
                // Start flow now supports Normal/Scheduled modes in admin-meeting page.
                window.location.href='admin-meeting.html'
            }catch(e){
                alert('Failed: '+e.message)
            }
        }

        async function loadUsers(){

            try{

                const res=await fetch('/api/admin/users')
                const users=await res.json()

                window._allUsers=users

                render(users)

            }catch(e){

                alert("Failed to load users")

            }

        }

        function render(users){

            const tbody=document.getElementById('tbody')
            tbody.innerHTML=''

            if(users.length===0){
                tbody.innerHTML='<tr><td colspan="6">No users found</td></tr>'
                return
            }

            for(const u of users){

                const tr=document.createElement('tr')

                tr.innerHTML=`

<td>${u.id}</td>
<td>${u.username}</td>
<td>${u.email}</td>
<td>${u.verified?'Verified':'Not Verified'}</td>
<td>${u.active?'Active':'Inactive'}</td>

<td>

<button class="activate" data-id="${u.id}" data-action="activate" ${u.active?'disabled':''}>Activate</button>

<button class="deactivate" data-id="${u.id}" data-action="deactivate" ${!u.active?'disabled':''}>Deactivate</button>

<button class="view-user" data-id="${u.id}" data-username="${u.username||''}" data-action="view">View User Info</button>

<button class="delete" data-id="${u.id}" data-action="delete">Delete</button>

</td>
`

                tbody.appendChild(tr)

            }

            tbody.querySelectorAll('button').forEach(b=>b.addEventListener('click',onAction))

        }

        async function onAction(e){

            const id=e.target.getAttribute('data-id')
            const action=e.target.getAttribute('data-action')

            if(!id || !action){
                alert('Invalid action')
                return
            }

            if(action==='view'){
                showUserInfoModal(id, e.target.getAttribute('data-username'))
                return
            }

            if(action==='delete' && !confirm('Delete this user?')) return

            let method='POST'
            let url=`/api/admin/users/${id}/${action}`

            if(action==='delete'){
                method='DELETE'
                url=`/api/admin/users/${id}`
            }

            try{
                const res=await fetch(url,{method})
                if(res.ok){
                    loadUsers()
                }else{
                    const err=await res.json().catch(()=>({}))
                    alert('Failed: '+(err.message||err.error||res.statusText))
                }
            }catch(ex){
                alert('Request failed: '+ex.message)
            }
        }

        function escapeHtml(v){
            if(v==null) return ''
            return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
        }

        function destroyModalCharts(){
            if(!window._adminUserModalCharts) return
            window._adminUserModalCharts.forEach(c=>{ try{ c.destroy() }catch(_e){} })
            window._adminUserModalCharts=[]
        }

        async function showUserInfoModal(userId, username){
            const modal=document.getElementById('userInfoModal')
            const content=document.getElementById('userInfoContent')
            modal.style.display='flex'
            content.innerHTML='<p>Loading...</p>'
            destroyModalCharts()
            try{
                const [profileRes,analyticsRes]=await Promise.all([
                    fetch('/api/users/'+userId+'/profile'),
                    fetch('/api/users/'+userId+'/profile/analytics')
                ])
                const data=await profileRes.json()
                const analytics=analyticsRes.ok?await analyticsRes.json():null
                if(!profileRes.ok) throw new Error(data.message||'Failed to load')

                const p=data.profile||{}
                const profileImg=p.profileImage?('/api/files/'+p.profileImage):'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="100%25" height="100%25" fill="%23e9ecef"/><circle cx="60" cy="45" r="22" fill="%23adb5bd"/><rect x="28" y="76" width="64" height="30" rx="15" fill="%23adb5bd"/></svg>'
                const fullName=[p.firstName,p.middleName,p.lastName].filter(Boolean).join(' ')||username||('User '+userId)
                const location=[p.city,p.state,p.country].filter(Boolean).join(', ')||'Location not set'
                const programme=({btech:'B.Tech',diploma:'Diploma',mtech:'M.Tech'}[p.currentCourse]||p.currentCourse||'Not set')

                const edu=(data.education||[])
                const skills=(data.skills||[])
                const pl=(data.programmingLanguages||[])
                const exp=(data.experience||[])
                const certs=(data.certificates||[])
                const docs=(data.documents||[])

                let html=''
                html+='<div class="admin-user-hero">'
                html+='<img class="admin-user-avatar" src="'+profileImg+'" alt="Profile"/>'
                html+='<div><h3 style="margin:0">'+escapeHtml(fullName)+'</h3>'
                html+='<div style="margin-top:6px;color:#666">'+escapeHtml(location)+'</div>'
                html+='<div style="margin-top:6px"><span class="admin-user-chip">ID '+userId+'</span><span class="admin-user-chip">'+escapeHtml(programme)+'</span></div></div>'
                html+='</div>'

                html+='<div class="admin-user-card-grid">'
                html+='<div class="admin-user-card"><strong>Email</strong><div style="margin-top:6px">'+escapeHtml((window._allUsers||[]).find(u=>Number(u.id)===Number(userId))?.email||'')+'</div></div>'
                html+='<div class="admin-user-card"><strong>Phone</strong><div style="margin-top:6px">'+escapeHtml(p.contactNumber||'Not set')+'</div></div>'
                html+='<div class="admin-user-card"><strong>Gender / DOB</strong><div style="margin-top:6px">'+escapeHtml((p.gender||'NA')+' / '+(p.dob||'NA'))+'</div></div>'
                html+='<div class="admin-user-card"><strong>Links</strong><div style="margin-top:6px">'+(p.linkedinUrl?'<a href="'+escapeHtml(p.linkedinUrl)+'" target="_blank">LinkedIn</a> ':'')+(p.githubUrl?'<a href="'+escapeHtml(p.githubUrl)+'" target="_blank">GitHub</a>':'')+'</div></div>'
                html+='</div>'

                html+='<h4 class="admin-user-title">Profile Sections</h4>'
                html+='<div class="admin-user-card-grid">'
                html+='<div class="admin-user-card"><strong>Education</strong><div style="margin-top:6px">'+edu.length+' rows</div></div>'
                html+='<div class="admin-user-card"><strong>Experience</strong><div style="margin-top:6px">'+exp.length+' rows</div></div>'
                html+='<div class="admin-user-card"><strong>Skills + Languages</strong><div style="margin-top:6px">'+(skills.length+pl.length)+' items</div></div>'
                html+='<div class="admin-user-card"><strong>Credentials</strong><div style="margin-top:6px">'+(certs.length+docs.length)+' files</div></div>'
                html+='</div>'

                if(analytics){
                    html+='<h4 class="admin-user-title">Analytics Snapshot</h4>'
                    html+='<div class="admin-user-card-grid">'
                    html+='<div class="admin-user-card"><canvas id="adminUserSectionChart" height="180"></canvas></div>'
                    html+='<div class="admin-user-card"><canvas id="adminUserSkillsChart" height="180"></canvas></div>'
                    html+='<div class="admin-user-card" style="grid-column:1/-1"><canvas id="adminUserRadarChart" height="180"></canvas></div>'
                    html+='</div>'
                }

                if(edu.length){
                    html+='<h4 class="admin-user-title">Education</h4><div class="admin-user-card-grid">'
                    edu.slice(0,12).forEach(e=>{
                        html+='<div class="admin-user-card"><div><strong>'+escapeHtml(e.collegeName||'College')+'</strong></div><div style="font-size:13px;margin-top:4px">'+escapeHtml((e.educationLevel||'')+' '+(e.branch||''))+'</div><div style="font-size:12px;color:#666;margin-top:4px">Sem '+escapeHtml(e.semester||'-')+' | CGPA '+escapeHtml(e.cgpa||'-')+'</div></div>'
                    })
                    html+='</div>'
                }

                if(skills.length||pl.length){
                    html+='<h4 class="admin-user-title">Skills and Languages</h4>'
                    html+='<div>'+skills.map(x=>'<span class="admin-user-chip">'+escapeHtml(x.skillName+' ('+(x.skillLevel||'NA')+')')+'</span>').join('')+'</div>'
                    html+='<div style="margin-top:8px">'+pl.map(x=>'<span class="admin-user-chip">'+escapeHtml(x.languageName+' ('+(x.proficiencyLevel||'NA')+')')+'</span>').join('')+'</div>'
                }

                if(exp.length){
                    html+='<h4 class="admin-user-title">Experience</h4><div class="admin-user-card-grid">'
                    exp.slice(0,12).forEach(e=>{
                        html+='<div class="admin-user-card"><div><strong>'+escapeHtml(e.companyName||'Company')+'</strong></div><div style="font-size:13px;margin-top:4px">'+escapeHtml(e.jobRole||'')+'</div><div style="font-size:12px;color:#666;margin-top:4px">'+escapeHtml((e.startDate||'')+' - '+(e.endDate||'Present'))+'</div></div>'
                    })
                    html+='</div>'
                }

                if(certs.length||docs.length){
                    html+='<h4 class="admin-user-title">Certificates & Documents</h4><div class="admin-user-card-grid">'
                    certs.slice(0,10).forEach(c=>{
                        html+='<div class="admin-user-card"><strong>'+escapeHtml(c.certificateName||'Certificate')+'</strong><div style="font-size:12px;color:#666;margin-top:4px">'+escapeHtml(c.issuer||'')+'</div></div>'
                    })
                    docs.slice(0,10).forEach(d=>{
                        html+='<div class="admin-user-card"><strong>'+escapeHtml(d.documentName||'Document')+'</strong></div>'
                    })
                    html+='</div>'
                }

                content.innerHTML=html

                if(analytics && window.Chart){
                    window._adminUserModalCharts=[]
                    const secCtx=document.getElementById('adminUserSectionChart')
                    const skillCtx=document.getElementById('adminUserSkillsChart')
                    const radarCtx=document.getElementById('adminUserRadarChart')
                    if(secCtx && (analytics.sectionCounts||[]).length){
                        window._adminUserModalCharts.push(new Chart(secCtx,{
                            type:'bar',
                            data:{labels:analytics.sectionCounts.map(x=>x.name),datasets:[{label:'Count',data:analytics.sectionCounts.map(x=>x.value),backgroundColor:'#6c5ce7'}]},
                            options:{plugins:{legend:{display:false},title:{display:true,text:'Profile depth'}}}
                        }))
                    }
                    if(skillCtx && (analytics.skillLevelDistribution||[]).length){
                        window._adminUserModalCharts.push(new Chart(skillCtx,{
                            type:'doughnut',
                            data:{labels:analytics.skillLevelDistribution.map(x=>x.name),datasets:[{data:analytics.skillLevelDistribution.map(x=>x.value),backgroundColor:['#6c5ce7','#00b894','#fdcb6e','#e17055']}]},
                            options:{plugins:{title:{display:true,text:'Skill level'}}}
                        }))
                    }
                    if(radarCtx && analytics.radarCompare && analytics.radarCompare.labels){
                        window._adminUserModalCharts.push(new Chart(radarCtx,{
                            type:'radar',
                            data:{
                                labels:analytics.radarCompare.labels,
                                datasets:[
                                    {label:'User',data:analytics.radarCompare.userScores||[],borderColor:'#6c5ce7',backgroundColor:'rgba(108,92,231,0.2)'},
                                    {label:'Cohort',data:analytics.radarCompare.cohortScores||[],borderColor:'#b2bec3',backgroundColor:'rgba(178,190,195,0.12)'}
                                ]
                            },
                            options:{plugins:{title:{display:true,text:'User vs cohort'}}}
                        }))
                    }
                }
            }catch(err){
                content.innerHTML='<p style="color:red">'+escapeHtml(err.message)+'</p>'
            }
        }

        function closeUserInfoModal(){
            document.getElementById('userInfoModal').style.display='none'
            destroyModalCharts()
        }

        function applyFilter(){

            const q=document.getElementById('q').value.toLowerCase()
            const status=document.getElementById('status').value

            let users=window._allUsers||[]

            if(q) users=users.filter(u=>u.email.toLowerCase().includes(q))

            if(status!=='any')
                users=users.filter(u=>(u.verified?'verified':'not')===status)

            render(users)

        }

        async function loadInterviewAdminData(){

            const [slotsRes,bookingsRes]=await Promise.all([

                fetch('/api/admin/interviews/slots'),
                fetch('/api/admin/interviews/bookings')

            ])

            window._slots=await slotsRes.json()
            window._bookings=await bookingsRes.json()

            renderSlots()
            renderBookings()

        }

        function renderSlots(){

            const tbody=document.getElementById('slotBody')
            tbody.innerHTML='';

            (window._slots||[]).forEach(s=>{

                const when=new Date(s.scheduledAt).toLocaleString()

                const tr=document.createElement('tr')

                tr.innerHTML=`

<td>${s.id}</td>
<td>${s.title}</td>
<td>${when}</td>
<td>${s.durationMinutes}</td>
<td>${s.bookedCount}/${s.capacity}</td>

<td>
<button class="delete" onclick="deleteSlot(${s.id})">Delete</button>
</td>
`

                tbody.appendChild(tr)

            })

        }

        function renderBookings(){

            const tbody=document.getElementById('bookingBody')
            tbody.innerHTML='';

            (window._bookings||[]).forEach(b=>{

                const when=new Date(b.scheduledAt).toLocaleString()

                const tr=document.createElement('tr')

                tr.innerHTML=`

<td>${b.id}</td>
<td>${b.slotTitle}</td>
<td>${when}</td>
<td>${b.userId}</td>
<td>${b.username}</td>
<td>${b.email}</td>
<td>${b.status}</td>
`

                tbody.appendChild(tr)

            })

        }

        async function createSlot(event){

            event.preventDefault()

            const duration=parseInt(document.getElementById('slotDuration').value)||30
            const capacity=parseInt(document.getElementById('slotCapacity').value)||1

            const payload={

                title:document.getElementById('slotTitle').value,
                description:document.getElementById('slotDescription').value,
                scheduledAt:document.getElementById('slotDateTime').value,
                durationMinutes:duration>=15?duration:30,
                capacity:capacity>=1?capacity:1

            }

            if(!payload.scheduledAt){
                alert('Please enter date and time')
                return
            }

            try{
                const res=await fetch('/api/admin/interviews/slots',{

                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify(payload)

                })

                if(res.ok){

                    document.getElementById('slotForm').reset()
                    loadInterviewAdminData()

                }else{
                    const err=await res.json().catch(()=>({}))
                    alert('Failed: '+(err.message||(err.fields&&JSON.stringify(err.fields))||err.error||res.statusText))
                }
            }catch(ex){
                alert('Request failed: '+ex.message)
            }
        }

        async function deleteSlot(id){

            if(!confirm('Delete this slot and its bookings?')) return

            try{
                const res=await fetch('/api/admin/interviews/slots/'+id,{method:'DELETE'})
                if(res.ok){
                    loadInterviewAdminData()
                }else{
                    const err=await res.json().catch(()=>({}))
                    alert('Failed: '+(err.message||err.error||res.statusText))
                }
            }catch(ex){
                alert('Request failed: '+ex.message)
            }
        }
        function goDashboard(){
            window.location.href='admin.html';
        }

        function logout(){

            localStorage.removeItem('admin')
            localStorage.removeItem('adminMeetingToken')
            window.location.href='/admin/admin-login.html';

        }

    </script>

</head>

<body onload="loadDashboard()">

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">💡 INTERN PRO</div>


        <nav>

            <button class="active">Applicants</button>
            <button onclick="window.location.href='admin-appointments.html'">
                Appointments
            </button>
            <button onclick="window.location.href='admin-meeting.html'">Meeting Call (Video)</button>

            <button onclick="window.location.href='admin-fix-appointment.html'">Fix Appointment</button>
            <button onclick="window.location.href='admin-talent.html'">Talent</button>
            <button onclick="window.location.href='admin-settings.html'">Settings</button>

            <button onclick="logout()" class="logout">Logout</button>

        </nav>

    </aside>

    <!-- Main -->

    <main class="main">

        <h2>Admin Dashboard</h2>

        <div class="toolbar">

            <input id="q" placeholder="Filter by email" oninput="applyFilter()">

            <select id="status" onchange="applyFilter()">
                <option value="any">Any status</option>
                <option value="verified">Verified</option>
                <option value="not">Not Verified</option>
            </select>

            <button id="startMeetingBtn" class="create-btn" style="background:#2ecc71;">Start Meeting</button>

        </div>

        <table>

            <thead>

            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Verified</th>
                <th>Active</th>
                <th>Actions</th>
            </tr>

            </thead>

            <tbody id="tbody"></tbody>

        </table>

        <div class="section">

            <h3>Interview Slots</h3>

            <form id="slotForm" onsubmit="createSlot(event)">

                <div class="toolbar">

                    <input id="slotTitle" placeholder="Title" required>
                    <input id="slotDescription" placeholder="Description">
                    <input id="slotDateTime" type="datetime-local" required>
                    <input id="slotDuration" type="number" value="30">
                    <input id="slotCapacity" type="number" value="1">

                    <button type="submit" class="create-btn">Create Slot</button>

                </div>

            </form>

            <table>

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>When</th>
                    <th>Duration</th>
                    <th>Booked/Capacity</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody id="slotBody"></tbody>

            </table>

        </div>

        <div class="section">

            <h3>Interview Bookings</h3>

            <table>

                <thead>

                <tr>
                    <th>ID</th>
                    <th>Slot</th>
                    <th>When</th>
                    <th>User ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Status</th>
                </tr>

                </thead>

                <tbody id="bookingBody"></tbody>

            </table>

        </div>

    </main>

</div>

<!-- User Info Modal -->
<div id="userInfoModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;justify-content:center;align-items:center;" onclick="if(event.target===this)closeUserInfoModal()">
    <div class="admin-user-modal" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="margin:0;">User Information</h3>
            <button onclick="closeUserInfoModal()" style="background:#666;color:white;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;">Close</button>
        </div>
        <div id="userInfoContent"></div>
    </div>
</div>

</body>
</html>
