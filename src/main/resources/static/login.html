<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <style>
        body { font-family: sans-serif; max-width: 420px; margin: 40px auto; }
        form { display: grid; gap: 12px; }
        input, button { padding: 10px; font-size: 16px; }
        .msg { margin-top: 12px; }
        a { font-size: 14px; }
    </style>
    <script>
        async function loginUser(event) {
            event.preventDefault();
            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            const res = await fetch('/api/users/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const msg = document.getElementById('msg');
            if (res.ok) {
                const user = await res.json();
                // sessionStorage is per-tab (prevents multiple tabs overriding each other)
                sessionStorage.setItem('user', JSON.stringify(user));
                // keep localStorage as fallback for older pages
                localStorage.setItem('user', JSON.stringify(user));
                window.location.href = '/user/user.html';
            } else {
                msg.textContent = 'Invalid credentials or email not verified';
                msg.style.color = 'red';
            }
        }
    </script>
    </head>
<body>
    <h2>User Login</h2>
    <form onsubmit="loginUser(event)">
        <input id="email" type="email" placeholder="Email" required>
        <input id="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <div id="msg" class="msg"></div>
        <p><a href="/register.html">Create an account</a></p>
        <p><a href="/admin/admin-login.html">Admin login</a></p>
    </form>

</body>
</html>
