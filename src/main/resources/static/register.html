<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <style>
        body { font-family: sans-serif; max-width: 420px; margin: 40px auto; }
        form { display: grid; gap: 12px; }
        input, button { padding: 10px; font-size: 16px; }
        .msg { margin-top: 12px; }
        a { font-size: 14px; }
    </style>
    <script>
        async function registerUser(event) {
            event.preventDefault();
            const payload = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            const res = await fetch('/api/users/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const msg = document.getElementById('msg');
            if (res.ok) {
                msg.textContent = 'Registered. Check your email to verify.';
                msg.style.color = 'green';
            } else {
                msg.textContent = 'Registration failed';
                msg.style.color = 'red';
            }
        }
    </script>
    </head>
<body>
    <h2>Create Account</h2>
    <form onsubmit="registerUser(event)">
        <input id="username" placeholder="Username" required>
        <input id="email" type="email" placeholder="Email" required>
        <input id="password" type="password" placeholder="Password (min 6)" minlength="6" required>
        <button type="submit">Register</button>
    </form>
    <div id="msg" class="msg"></div>
    <p><a href="/login.html">Already have an account? Login</a></p>
</body>
</html>
